# ─────────────────────────────────────────────
# Aima Legacy — Hardened nginx config
# Last updated: 2026-04-12
# ─────────────────────────────────────────────

# Rate limiting zones (applied before server block)
# 10 req/s per IP for general pages, burst 20
limit_req_zone $binary_remote_addr zone=general:10m rate=10r/s;
# 2 req/s per IP for API/blog JSON (prevent scraping)
limit_req_zone $binary_remote_addr zone=api:10m rate=2r/s;
# Connection limit per IP
limit_conn_zone $binary_remote_addr zone=addr:10m;

server {
    listen 80 default_server;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # ─────────────────────────────────────────
    # Global security settings
    # ─────────────────────────────────────────
    server_tokens off;

    # Connection limit: max 50 concurrent connections per IP
    limit_conn addr 50;
    limit_conn_status 429;
    limit_req_status 429;

    # Max request body size (no uploads on this site)
    client_max_body_size 1m;

    # Timeouts to prevent slowloris attacks
    client_body_timeout 10s;
    client_header_timeout 10s;
    send_timeout 10s;
    keepalive_timeout 30s;

    # ─────────────────────────────────────────
    # Security headers map (reusable via include-like pattern)
    # NOTE: nginx drops parent headers when child has add_header.
    # Every location MUST include its own headers.
    # ─────────────────────────────────────────

    # ─────────────────────────────────────────
    # BLOCK: Sensitive files and paths
    # Returns 404 (not 403) to avoid information leakage
    # ─────────────────────────────────────────
    location ~ /\. {
        # Blocks /.env, /.git, /.htaccess, /.svn, etc.
        return 404;
    }

    location ~* ^/(wp-admin|wp-login|wp-content|wp-includes|xmlrpc\.php|administrator|phpmyadmin|adminer|\.well-known/acme-challenge) {
        return 404;
    }

    location ~* \.(sql|bak|old|orig|save|swp|log|conf|ini|sh|py|php|asp|aspx|jsp|cgi)$ {
        return 404;
    }

    # Block common attack vectors
    location ~* ^/(cgi-bin|scripts|vendor|node_modules|\.vscode|\.idea) {
        return 404;
    }

    # ─────────────────────────────────────────
    # Redirect /index.html -> / (avoid duplicate URL)
    # ─────────────────────────────────────────
    location = /index.html {
        return 301 https://$host/;
    }

    # ─────────────────────────────────────────
    # 404 handler
    # ─────────────────────────────────────────
    error_page 404 /404.html;
    location = /404.html {
        internal;
        root /usr/share/nginx/html;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-Frame-Options "DENY" always;
    }

    # ─────────────────────────────────────────
    # Legal pages
    # ─────────────────────────────────────────
    location = /privacidad.html {
        limit_req zone=general burst=20 nodelay;
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
        add_header X-Frame-Options "DENY" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Permissions-Policy "camera=(), microphone=(self), geolocation=(), payment=(), usb=(), interest-cohort=()" always;
        add_header Cross-Origin-Opener-Policy "same-origin" always;
        try_files $uri =404;
    }
    location = /aviso-legal.html {
        limit_req zone=general burst=20 nodelay;
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
        add_header X-Frame-Options "DENY" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Permissions-Policy "camera=(), microphone=(self), geolocation=(), payment=(), usb=(), interest-cohort=()" always;
        add_header Cross-Origin-Opener-Policy "same-origin" always;
        try_files $uri =404;
    }
    location = /cookies.html {
        limit_req zone=general burst=20 nodelay;
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
        add_header X-Frame-Options "DENY" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Permissions-Policy "camera=(), microphone=(self), geolocation=(), payment=(), usb=(), interest-cohort=()" always;
        add_header Cross-Origin-Opener-Policy "same-origin" always;
        try_files $uri =404;
    }

    # ─────────────────────────────────────────
    # Sitemap, robots, llms — public, no security headers needed on data files
    # ─────────────────────────────────────────
    location = /sitemap.xml {
        limit_req zone=general burst=5 nodelay;
        add_header Content-Type application/xml;
        add_header X-Content-Type-Options "nosniff" always;
        try_files $uri =404;
    }
    location = /robots.txt {
        limit_req zone=general burst=5 nodelay;
        add_header Content-Type text/plain;
        add_header X-Content-Type-Options "nosniff" always;
        try_files $uri =404;
    }
    location = /llms.txt {
        limit_req zone=general burst=5 nodelay;
        add_header Content-Type text/plain;
        add_header X-Content-Type-Options "nosniff" always;
        try_files $uri =404;
    }
    location = /.well-known/security.txt {
        add_header Content-Type text/plain;
        add_header X-Content-Type-Options "nosniff" always;
        try_files $uri =404;
    }

    # ─────────────────────────────────────────
    # Blog post data (JSON) — rate limited to prevent scraping
    # ─────────────────────────────────────────
    location ~* ^/blog/posts/.*\.json$ {
        limit_req zone=api burst=10 nodelay;
        add_header Content-Type application/json;
        add_header Cache-Control "public, max-age=300, must-revalidate";
        add_header X-Content-Type-Options "nosniff" always;
        add_header Cross-Origin-Resource-Policy "same-origin" always;
        try_files $uri =404;
    }

    # ─────────────────────────────────────────
    # Static assets (content-hashed, long cache)
    # ─────────────────────────────────────────
    location ~* ^/assets/.*\.(js|css|woff2?|ttf|otf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable, max-age=31536000";
        add_header X-Content-Type-Options "nosniff" always;
        add_header Cross-Origin-Resource-Policy "same-origin" always;
        access_log off;
    }

    # Images and favicons
    location ~* \.(png|jpe?g|gif|svg|ico|webp|avif)$ {
        expires 1y;
        add_header Cache-Control "public, max-age=31536000";
        add_header X-Content-Type-Options "nosniff" always;
        access_log off;
    }

    # ─────────────────────────────────────────
    # Homepage — full security headers + CSP
    # ─────────────────────────────────────────
    location = / {
        limit_req zone=general burst=20 nodelay;
        add_header Cache-Control "public, max-age=300, must-revalidate" always;
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Permissions-Policy "camera=(), microphone=(self), geolocation=(), payment=(), usb=(), interest-cohort=()" always;
        add_header Cross-Origin-Opener-Policy "same-origin-allow-popups" always;
        add_header Cross-Origin-Resource-Policy "same-origin" always;
        add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' blob: https://unpkg.com https://cdn.jsdelivr.net https://connect.facebook.net https://*.elevenlabs.io https://*.convai.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' data: https://fonts.gstatic.com; img-src 'self' data: https: blob:; media-src 'self' blob: https:; connect-src 'self' https://api.elevenlabs.io wss://api.elevenlabs.io https://api.us.elevenlabs.io wss://api.us.elevenlabs.io https://api.eu.elevenlabs.io wss://api.eu.elevenlabs.io https://*.elevenlabs.io wss://*.elevenlabs.io https://*.convai.com wss://*.convai.com https://www.facebook.com; frame-src 'self' https://*.elevenlabs.io https://*.convai.com; worker-src 'self' blob:; object-src 'none'; base-uri 'self'; form-action 'self'; frame-ancestors 'self'; upgrade-insecure-requests;" always;
        try_files /index.html =404;
    }

    # ─────────────────────────────────────────
    # SPA routes (/blog, /blog/*)
    # ─────────────────────────────────────────
    location ~ ^/blog(/.*)?$ {
        limit_req zone=general burst=20 nodelay;
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Permissions-Policy "camera=(), microphone=(self), geolocation=(), payment=(), usb=(), interest-cohort=()" always;
        add_header Cross-Origin-Opener-Policy "same-origin-allow-popups" always;
        add_header Cross-Origin-Resource-Policy "same-origin" always;
        add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' blob: https://unpkg.com https://cdn.jsdelivr.net https://connect.facebook.net https://*.elevenlabs.io https://*.convai.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' data: https://fonts.gstatic.com; img-src 'self' data: https: blob:; media-src 'self' blob: https:; connect-src 'self' https://api.elevenlabs.io wss://api.elevenlabs.io https://api.us.elevenlabs.io wss://api.us.elevenlabs.io https://api.eu.elevenlabs.io wss://api.eu.elevenlabs.io https://*.elevenlabs.io wss://*.elevenlabs.io https://*.convai.com wss://*.convai.com https://www.facebook.com; frame-src 'self' https://*.elevenlabs.io https://*.convai.com; worker-src 'self' blob:; object-src 'none'; base-uri 'self'; form-action 'self'; frame-ancestors 'self'; upgrade-insecure-requests;" always;
        try_files $uri /index.html;
    }

    # ─────────────────────────────────────────
    # Catch-all — return 404 for unknown routes
    # ─────────────────────────────────────────
    location / {
        add_header X-Content-Type-Options "nosniff" always;
        try_files $uri $uri/ =404;
    }

    # ─────────────────────────────────────────
    # Gzip compression
    # ─────────────────────────────────────────
    gzip on;
    gzip_vary on;
    gzip_min_length 256;
    gzip_comp_level 6;
    gzip_types
        text/plain
        text/css
        text/xml
        text/javascript
        application/json
        application/ld+json
        application/javascript
        application/xml
        application/xml+rss
        image/svg+xml
        font/woff
        font/woff2;
}
