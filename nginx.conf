server {
    listen 80 default_server;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # ─────────────────────────────────────────────
    # NOTE: Security headers are defined per-location block.
    # DO NOT add top-level add_header directives here — nginx silently
    # discards parent-level headers when a child location has its own
    # add_header directive (nginx inheritance rule).
    # ─────────────────────────────────────────────

    # ─────────────────────────────────────────────
    # Redirect /index.html → / (avoid duplicate URL)
    # Uses hardcoded https:// to prevent HTTP downgrade via $scheme
    # ─────────────────────────────────────────────
    location = /index.html {
        return 301 https://$host/;
    }

    # ─────────────────────────────────────────────
    # 404 handler
    # ─────────────────────────────────────────────
    error_page 404 /404.html;
    location = /404.html {
        internal;
        root /usr/share/nginx/html;
    }

    # Legal pages — explicit routes so they don't get SPA-fallback
    location = /privacidad.html { try_files $uri =404; }
    location = /aviso-legal.html { try_files $uri =404; }
    location = /cookies.html { try_files $uri =404; }

    # Sitemap, robots, llms — served directly
    location = /sitemap.xml { try_files $uri =404; add_header Content-Type application/xml; }
    location = /robots.txt  { try_files $uri =404; add_header Content-Type text/plain; }
    location = /llms.txt    { try_files $uri =404; add_header Content-Type text/plain; }

    # Cache static assets (long-term, content-hashed filenames)
    location ~* ^/assets/.*\.(js|css|woff2?|ttf|otf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable, max-age=31536000";
        access_log off;
    }

    # Cache images and favicons
    location ~* \.(png|jpe?g|gif|svg|ico|webp|avif)$ {
        expires 1y;
        add_header Cache-Control "public, max-age=31536000";
        access_log off;
    }

    # ─────────────────────────────────────────────
    # Homepage — short cache + full security headers
    # Headers duplicated here because nginx drops parent-level headers
    # when this location has its own add_header directive.
    # ─────────────────────────────────────────────
    location = / {
        add_header Cache-Control "public, max-age=300, must-revalidate" always;
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Permissions-Policy "camera=(), microphone=(self), geolocation=(), payment=(), usb=(), interest-cohort=()" always;
        add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval' https://unpkg.com https://cdn.jsdelivr.net https://connect.facebook.net; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' data: https://fonts.gstatic.com; img-src 'self' data: https: blob:; media-src 'self' blob: https:; connect-src 'self' https://api.elevenlabs.io wss://api.elevenlabs.io https://api.us.elevenlabs.io wss://api.us.elevenlabs.io https://api.eu.elevenlabs.io wss://api.eu.elevenlabs.io https://*.elevenlabs.io wss://*.elevenlabs.io https://aprendiendo1-n8n.qtma3u.easypanel.host https://www.facebook.com; frame-src 'self' https://*.elevenlabs.io; worker-src 'self' blob:; object-src 'none'; base-uri 'self'; form-action 'self';" always;
        try_files /index.html =404;
    }

    # ─────────────────────────────────────────────
    # SPA fallback — serves index.html for all React routes
    # Same security headers required (cannot inherit from server block)
    # ─────────────────────────────────────────────
    location / {
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Permissions-Policy "camera=(), microphone=(self), geolocation=(), payment=(), usb=(), interest-cohort=()" always;
        add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval' https://unpkg.com https://cdn.jsdelivr.net https://connect.facebook.net; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' data: https://fonts.gstatic.com; img-src 'self' data: https: blob:; media-src 'self' blob: https:; connect-src 'self' https://api.elevenlabs.io wss://api.elevenlabs.io https://api.us.elevenlabs.io wss://api.us.elevenlabs.io https://api.eu.elevenlabs.io wss://api.eu.elevenlabs.io https://*.elevenlabs.io wss://*.elevenlabs.io https://aprendiendo1-n8n.qtma3u.easypanel.host https://www.facebook.com; frame-src 'self' https://*.elevenlabs.io; worker-src 'self' blob:; object-src 'none'; base-uri 'self'; form-action 'self';" always;
        try_files $uri $uri/ /index.html;
    }

    # Gzip
    gzip on;
    gzip_vary on;
    gzip_min_length 256;
    gzip_comp_level 6;
    gzip_types
        text/plain
        text/css
        text/xml
        text/javascript
        application/json
        application/ld+json
        application/javascript
        application/xml
        application/xml+rss
        image/svg+xml
        font/woff
        font/woff2;

    # Disable server tokens (security)
    server_tokens off;
}
