    <!-- Schema.org — FAQPage -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "FAQPage",
      "mainEntity": [
        {
          "@type": "Question",
          "name": "¿Qué incluye el diagnóstico inicial?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "El diagnóstico es un producto cerrado de 4 fases: mapeo de procesos BPMN, detección de mejoras y oportunidades, revisión de ciberseguridad, y un roadmap priorizado a medida. Recibes un documento profesional con todo analizado — no es una reunión ni una charla informal."
          }
        },
        {
          "@type": "Question",
          "name": "¿Cuánto tiempo tarda en verse resultados?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "El diagnóstico se entrega en 5-7 días laborables. Una vez aprobado el roadmap, las primeras automatizaciones pueden estar activas en 2-4 semanas. Algunos clientes ven ahorro de tiempo desde la primera semana de implementación."
          }
        },
        {
          "@type": "Question",
          "name": "¿Necesito conocimientos técnicos?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "No. Nosotros nos encargamos de todo lo técnico. Tú solo necesitas contarnos cómo funciona tu negocio y qué problemas tienes. El diagnóstico traduce la tecnología en decisiones claras que puedes entender."
          }
        },
        {
          "@type": "Question",
          "name": "¿Qué tipo de negocios atendéis?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Trabajamos con negocios locales en España: clínicas, restaurantes, peluquerías, tatuadores, tiendas, estudios de yoga, academias... Cualquier negocio que tenga procesos repetitivos y quiera optimizarlos con IA."
          }
        },
        {
          "@type": "Question",
          "name": "¿Qué pasa si algo falla después de implementar?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Cada sistema que entregamos incluye Plan A, B, C y D. Si el componente principal falla, hay alternativas activas automáticas. Tu negocio nunca se queda bloqueado. Además, monitorizamos todo con alertas en tiempo real."
          }
        },
        {
          "@type": "Question",
          "name": "¿Puedo ver un ejemplo antes de contratar?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "El diagnóstico inicial es precisamente eso: nuestro primer producto donde demostramos que entendemos tu negocio. No implementamos sin diagnóstico previo — así aseguramos que cada propuesta tiene sentido real."
          }
        },
        {
          "@type": "Question",
          "name": "¿Cuánto cuesta?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Depende del tamaño y complejidad de tu negocio. El diagnóstico tiene un precio fijo que te comunicamos en la primera conversación. La implementación se presupuesta una vez tenemos el roadmap aprobado. Sin sorpresas ni costes ocultos."
          }
        }
      ]
    }
    </script>
