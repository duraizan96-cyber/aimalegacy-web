<svg xmlns="http://www.w3.org/2000/svg" width="48" height="48" viewBox="0 0 48 48" fill="none">
  <defs>
    <linearGradient id="g" x1="12" y1="7" x2="37" y2="42" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#22d3ee"/>
      <stop offset="60%" stop-color="#0ea5e9"/>
      <stop offset="100%" stop-color="#0284c7"/>
    </linearGradient>
    <linearGradient id="bg" x1="0" y1="0" x2="48" y2="48" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#111827"/>
      <stop offset="100%" stop-color="#04040f"/>
    </linearGradient>
  </defs>

  <!-- Background rounded square -->
  <rect width="48" height="48" rx="10" fill="url(#bg)"/>

  <!-- A — left leg -->
  <line x1="24" y1="7" x2="10" y2="41" stroke="url(#g)" stroke-width="3.5" stroke-linecap="round"/>
  <!-- A — right leg -->
  <line x1="24" y1="7" x2="38" y2="41" stroke="url(#g)" stroke-width="3.5" stroke-linecap="round"/>

  <!-- Oval loop threading through the A (the brand's distinctive mark)
       Drawn as two arcs so it appears to weave in/out of the A legs -->
  <!-- Front arc (left side — in front of left leg) -->
  <path d="M 19.5 31 C 10 28 10 18 17 17 C 22 16.5 24 22 24 26"
        stroke="url(#g)" stroke-width="2.8" stroke-linecap="round" fill="none"/>
  <!-- Back arc (right side — behind right leg, slightly lighter) -->
  <path d="M 24 26 C 24 30 26 35 31 34 C 38 32 38 22 31 19 C 27 17.5 25 20 24 22"
        stroke="url(#g)" stroke-width="2.8" stroke-linecap="round" fill="none" opacity="0.75"/>
</svg>
