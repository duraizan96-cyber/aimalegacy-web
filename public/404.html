<!doctype html>
<html lang="es-ES">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Página no encontrada — Aima Legacy</title>
  <meta name="description" content="La página que buscas no existe o ha cambiado de ubicación." />
  <meta name="robots" content="noindex, follow" />
  <link rel="canonical" href="https://aimalegacy.es/" />
  <link rel="icon" type="image/jpeg" href="/logo-aima.jpg" />
  <meta name="theme-color" content="#04040f" />
  <style>
    :root { --bg:#04040f; --text:#e7e7ea; --muted:#9a9aa0; --accent:#d4af37; }
    * { box-sizing: border-box; }
    body { margin:0; background:var(--bg); color:var(--text); font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif; display:flex; align-items:center; justify-content:center; min-height:100vh; padding:24px; text-align:center; }
    .container { max-width:520px; }
    .code { font-size:clamp(5rem,15vw,9rem); font-weight:900; letter-spacing:-0.04em; background:linear-gradient(135deg,var(--accent),#f0d070); -webkit-background-clip:text; background-clip:text; color:transparent; line-height:1; margin:0 0 16px; }
    h1 { font-size:clamp(1.4rem,3vw,1.8rem); font-weight:700; margin:0 0 12px; }
    p { color:var(--muted); line-height:1.6; margin:0 0 32px; }
    a { display:inline-block; background:var(--accent); color:#04040f; padding:14px 28px; border-radius:10px; text-decoration:none; font-weight:600; transition:transform .2s, box-shadow .2s; }
    a:hover { transform:translateY(-2px); box-shadow:0 10px 30px rgba(212,175,55,0.3); }
    .back { display:block; color:var(--muted); margin-top:24px; font-size:14px; background:none; padding:0; }
    .back:hover { color:var(--accent); box-shadow:none; transform:none; }
  </style>
</head>
<body>
  <main class="container">
    <div class="code">404</div>
    <h1>Esta página no existe</h1>
    <p>La URL que has seguido no lleva a ningún contenido de Aima Legacy. Puede que haya cambiado, que la hayas escrito con una errata o que nunca haya existido.</p>
    <a href="/">Volver al inicio de Aima Legacy</a>
    <a href="mailto:izan@aimalegacy.es" class="back">¿Buscas algo concreto? Escríbeme a izan@aimalegacy.es</a>
  </main>
</body>
</html>
